<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vino — The Wine Spa Concierge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #f0ece4;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  font-family: Georgia, serif;
}

.chat-container {
  width: 100%;
  max-width: 680px;
  display: flex;
  flex-direction: column;
  height: 90vh;
  max-height: 800px;
  box-shadow: 0 8px 48px rgba(45,92,78,0.15);
  border-radius: 20px;
}

.chat-header {
  background: #2D5C4E;
  border-radius: 20px 20px 0 0;
  padding: 20px 28px 16px;
}

.logo-img {
  display: block;
  height: 52px;
  width: auto;
  margin-bottom: 10px;
}

.status-line { display: flex; align-items: center; }

.status-dot {
  width: 8px;
  height: 8px;
  background: #4ade80;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.status-text {
  font-family: Jost, sans-serif;
  font-size: 11px;
  color: rgba(240,236,228,0.65);
  letter-spacing: 1px;
}

.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  background: #faf8f4;
  scrollbar-width: thin;
  scrollbar-color: rgba(45,92,78,0.2) transparent;
}

.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-thumb { background: rgba(45,92,78,0.25); border-radius: 2px; }

.time-badge {
  text-align: center;
  margin: 8px 0 16px;
  font-family: Jost, sans-serif;
  font-size: 10px;
  color: rgba(100,90,80,0.45);
  letter-spacing: 1px;
}

.message-row {
  display: flex;
  margin-bottom: 18px;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-row.user { justify-content: flex-end; }
.message-row.assistant { justify-content: flex-start; align-items: flex-end; }

.vino-avatar {
  width: 32px;
  height: 32px;
  background: #2D5C4E;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-right: 10px;
  flex-shrink: 0;
}

.message-bubble {
  max-width: 78%;
  padding: 14px 18px;
  border-radius: 18px;
  font-family: Jost, sans-serif;
  font-size: 14px;
  line-height: 1.7;
  font-weight: 300;
}

.message-bubble.user {
  background: #8B5741;
  color: #ffffff;
  border-radius: 18px 18px 4px 18px;
}

.message-bubble.assistant {
  background: #ffffff;
  color: #3a3028;
  border-radius: 18px 18px 18px 4px;
  border: 1px solid rgba(45,92,78,0.12);
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.suggestions-area {
  padding: 12px 20px 4px;
  background: #faf8f4;
  border-top: 1px solid rgba(45,92,78,0.08);
}

.suggestions-label {
  font-family: Jost, sans-serif;
  font-size: 10px;
  color: rgba(100,90,80,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.suggestions-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}

.suggestions-scroll::-webkit-scrollbar { display: none; }

.suggestion-chip {
  flex-shrink: 0;
  padding: 7px 14px;
  background: #ffffff;
  border: 1px solid rgba(45,92,78,0.3);
  border-radius: 20px;
  color: #2D5C4E;
  font-family: Jost, sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.suggestion-chip:hover {
  background: #2D5C4E;
  color: #ffffff;
  transform: translateY(-1px);
}

.input-area {
  background: #ffffff;
  border-top: 1px solid rgba(45,92,78,0.1);
  border-radius: 0 0 20px 20px;
  padding: 16px 20px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.input-field {
  flex: 1;
  background: #f5f2ed;
  border: 1px solid rgba(45,92,78,0.2);
  border-radius: 14px;
  padding: 12px 16px;
  color: #3a3028;
  font-family: Jost, sans-serif;
  font-size: 14px;
  font-weight: 300;
  resize: none;
  outline: none;
  min-height: 46px;
  max-height: 120px;
  transition: border-color 0.2s;
  line-height: 1.5;
}

.input-field::placeholder { color: rgba(80,70,60,0.4); }
.input-field:focus { border-color: rgba(45,92,78,0.5); }

.send-button {
  width: 46px;
  height: 46px;
  background: #2D5C4E;
  border: none;
  border-radius: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(45,92,78,0.3);
}

.send-button:hover:not(:disabled) {
  background: #1a3d30;
  transform: translateY(-1px);
}

.send-button:disabled { opacity: 0.4; cursor: not-allowed; }

.typing-indicator { display: flex; gap: 4px; padding: 4px 2px; align-items: center; }

.typing-dot {
  width: 7px;
  height: 7px;
  background: rgba(45,92,78,0.5);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-5px); opacity: 1; }
}
</style>
</head>

<script>
const SYSTEM_PROMPT = "You are Vino, the friendly and knowledgeable AI concierge for The Wine Spa. Portland's first and only wine spa, named one of Time Magazine's 100 Greatest Places to Visit in 2025. Speak with warmth and genuine enthusiasm. Guide guests toward booking. Booking Portland: https://thewinespa.zenoti.com/webstoreNew/services. Booking Dundee: https://thewinespa.zenoti.com/webstoreNew/services/0181a2fe-f8dc-43dd-b963-9e819e5858d2. Phone: 503-946-8450. Email: hello@thewinespapdx.com. PORTLAND: 1517 NE Broadway, Portland OR 97232. Hours: Sun-Mon 12-6pm, Tue 11-7pm, Wed CLOSED, Thu-Fri 11-7pm, Sat 10-7pm. DUNDEE: inside The Dundee Hotel, wine country. PACKAGES PORTLAND: Willamette $399 150min wine soak+massage+scrub+facial. Que Syrah $249 85min wine soak+body treatment+facial. Pinot Dreams Deluxe $275 105min wine soak+80min massage. Pinot Dreams $199 75min wine soak+50min massage guest favorite. Grape Escape $199 75min wine soak+facial. Merlot Glow $149 75min scrub+soak+body treatment. D-I-Wine for 1 $99 45min DIY soak. D-I-Wine for 2 $179 45min DIY soak for two. MASSAGES: Relaxation 50min $125/80min $199. Deep Tissue 50min $125/80min $199. Duet couples 50min $249/80min $399. FACIALS: Vino Express 30min $99. Resveratrol Lift 50min $235. GROUPS: up to 10 people, call to book, 2-4 weeks advance. FAQ: must be 21+, rooms fully private, not intoxicating, will not stain skin. Always be warm and concise.";

let messages = [];
let loading = false;

const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const messagesArea = document.getElementById("messages");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", () => {
  sendBtn.disabled = !input.value.trim() || loading;
});

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function sendSuggestion(btn) { sendMessage(btn.textContent); }

function addMessage(role, content) {
  const row = document.createElement("div");
  row.className = "message-row " + role;
  if (role === "assistant") {
    const avatar = document.createElement("div");
    avatar.className = "vino-avatar";
    avatar.textContent = "\u{1F377}";
    row.appendChild(avatar);
  }
  const bubble = document.createElement("div");
  bubble.className = "message-bubble " + role;
  bubble.innerHTML = content.replace(/\n/g, "<br>");
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "message-row assistant";
  row.id = "typing";
  const avatar = document.createElement("div");
  avatar.className = "vino-avatar";
  avatar.textContent = "\u{1F377}";
  row.appendChild(avatar);
  const bubble = document.createElement("div");
  bubble.className = "message-bubble assistant";
  bubble.innerHTML = "<div class=\"typing-indicator\"><div class=\"typing-dot\"></div><div class=\"typing-dot\"></div><div class=\"typing-dot\"></div></div>";
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage(text) {
  const userText = text || input.value.trim();
  if (!userText || loading) return;
  input.value = "";
  input.style.height = "auto";
  sendBtn.disabled = true;
  suggestions.style.display = "none";
  loading = true;
  messages.push({ role: "user", content: userText });
  addMessage("user", userText);
  showTyping();
  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM_PROMPT, messages: messages })
    });
    const data = await response.json();
    const reply = data.reply || "Sorry, I had trouble with that. Please try again!";
    removeTyping();
    messages.push({ role: "assistant", content: reply });
    addMessage("assistant", reply);
  } catch(e) {
    removeTyping();
    addMessage("assistant", "Something went wrong. Please try again!");
  }
  loading = false;
  sendBtn.disabled = !input.value.trim();
  input.focus();
}
</script>
